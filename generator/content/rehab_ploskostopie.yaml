intro:
  text: |
    Боли в стопах, усталость ног к вечеру, нагрузка на колени и поясницу — часто это следствие плоскостопия. Снижение свода запускает цепочку компенсаций вверх: пронация стопы → вальгус колена → наклон таза → гиперлордоз поясницы.

    Работаю по трёхфазной программе: подготовка тканей через массаж, затем ПИР и ЛФК для укрепления мышц-стабилизаторов свода. Приезжаю на дом по Москве, оцениваю функцию стопы и составляю индивидуальный план.

