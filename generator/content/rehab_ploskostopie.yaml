methodology:
  title: "Как строится программа"
  image: "/assets/image/services/rehab/ploskostopie.jpg"
  steps:
    - number: "01"
      title: "Оценка на первом сеансе"
      description: "Разбираем жалобы, смотрим на положение стопы, походку, осанку. Функциональные тесты показывают состояние свода и мышц — без диагнозов, только оценка функции."
    - number: "02"
      title: "Фаза I — Подготовка (сеансы 1–5)"
      description: "Массаж голеней и стоп: снимаем боль, улучшаем кровообращение, подготавливаем ткани. Работа с задней большеберцовой, икроножной, подошвенной фасцией."
    - number: "03"
      title: "Фаза II — Основная работа (сеансы 6–15)"
      description: "Добавляем ПИР — мягкое растяжение укороченных мышц через их собственное усилие. Параллельно — ЛФК: Short Foot, подъёмы на носок, баланс. Три упражнения, без перегрузки."
    - number: "04"
      title: "Фаза III — Закрепление (сеансы 16–20)"
      description: "Поддерживающая работа, усложнение ЛФК, переобучение паттерна ходьбы. Домашняя программа которую можно выполнять самостоятельно."

faq:
  - question: "Можно ли исправить плоскостопие у взрослого?"
    answer: "Полностью изменить структуру костей у взрослого нельзя. Цель программы — снизить боль и укрепить мышцы-стабилизаторы свода. При I–II степени функциональные показатели улучшаются заметно."
  - question: "Сколько сеансов нужно?"
    answer: "Программа рассчитана на 15–20 сеансов в три фазы. Первое облегчение — после 3–5 сеансов. Устойчивый результат — к 10-му сеансу при регулярных домашних упражнениях."
  - question: "Нужны ли стельки?"
    answer: "Стельки снимают симптомы, но не укрепляют мышцы. Вопрос о стельках — к ортопеду. В нашей программе работаем с мышцами — это долгосрочный результат."
  - question: "Нужно ли направление от врача?"
    answer: "Не обязательно, но желательно — особенно при выраженных болях или деформации. Перед началом программы рекомендую показаться ортопеду для уточнения степени."
  - question: "Когда нужно срочно к врачу?"
    answer: "Если есть онемение или покалывание пальцев, нарастающий отёк одной ноги, боль ночью в покое или боль не проходит 48 часов после сеанса — это сигнал для консультации врача."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

