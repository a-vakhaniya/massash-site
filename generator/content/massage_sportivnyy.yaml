faqs:
  - q: "Чем спортивный массаж отличается от классического?"
    a: "Спортивный массаж интенсивнее и глубже классического — акцент на восстановление после нагрузок, работу с перегруженными мышцами и профилактику травм. Классический массаж универсален и мягче. Если вы тренируетесь регулярно — спортивный даст более точный результат."
  - q: "Когда лучше делать массаж — до или после тренировки?"
    a: "После тренировки — восстановительный массаж через 2–6 часов: снимает крепатуру, ускоряет выведение молочной кислоты. До тренировки — тонизирующий, за 1–2 дня до соревнований. Непосредственно перед тренировкой глубокий массаж не рекомендуется."
  - q: "Сколько сеансов нужно для результата?"
    a: "При регулярных тренировках — 1 сеанс в 1–2 недели как поддерживающий. При накопленной усталости или после интенсивного цикла — курс 3–5 сеансов с интервалом 2–3 дня. Разовый сеанс даёт ощутимый результат уже после первого посещения."
  - q: "Выезжаете ли вы на дом?"
    a: "Да, выезжаю на дом по Москве в пределах МКАД и ближайшего Подмосковья. Приезжаю со всем необходимым — маслом и простынями. Стоимость выезда уточняется индивидуально."
  - q: "Есть ли противопоказания?"
    a: "Основные противопоказания: острые травмы (первые 48–72 часа), воспалительные процессы, высокая температура, тромбофлебит. При хронических заболеваниях — проконсультируйтесь с врачом. Если сомневаетесь — напишите мне, разберёмся вместе."
