faqs:
  - question: "Сколько нужно тренироваться для результата?"
    answer: "Оптимально — 2–3 раза в неделю плюс активность в остальные дни. Первые изменения в самочувствии — через 2–3 недели, видимый результат — через 4–6 недель при регулярных занятиях."
  - question: "Нужно ли соблюдать диету?"
    answer: "Без коррекции питания тренировки дадут меньший результат. Не даю жёстких диет — разбираем питание и даю практичные рекомендации которые реально соблюдать."
  - question: "Можно ли при проблемах с суставами?"
    answer: "Да, подбираем упражнения с учётом ограничений. На пробном занятии разбираем что можно, что нельзя — и строим программу вокруг этого."
  - question: "Какой инвентарь нужен дома?"
    answer: "Базовая программа строится без инвентаря — только пол и вес тела. Если есть коврик, резинки или гантели — хорошо, но не обязательно."
  - question: "Подходит ли после родов?"
    answer: "Да, но с учётом времени после родов и наличия диастаза. На пробном занятии разбираем ситуацию — подбираем мягкий старт без риска."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

