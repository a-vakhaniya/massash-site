intro:
  text: |
    Персональные тренировки для снижения веса — это не просто кардио. Это программа, в которой каждое занятие подобрано под ваш уровень, цели и состояние здоровья. Работаем с нагрузкой, восстановлением и образом жизни — всё в комплексе.

    Приезжаю на дом со всем необходимым. Никаких поездок в зал — занимаетесь в удобное время, в привычной обстановке. Контролирую технику, слежу за интенсивностью и корректирую программу по ходу работы.

