faqs:
  - question: "Чем ЛФК отличается от обычных тренировок?"
    answer: "ЛФК — это лечебная физкультура, направленная на восстановление функции и устранение болевых синдромов. Нагрузка подбирается с учётом состояния и ограничений. Обычные тренировки направлены на развитие физических качеств у здорового человека."
  - question: "Нужен ли инвентарь?"
    answer: "Нет. Работаем с весом тела — этого достаточно для большинства задач. При необходимости привожу резиновые петли и коврик."
  - question: "Стоит ли прислать документы или выписки заранее?"
    answer: "Да, если есть — пришлите заранее. Я изучу материалы до встречи и приеду подготовленным."
  - question: "Можно ли заниматься при хронических заболеваниях?"
    answer: "Да, именно для этого ЛФК и существует. Сообщите о заболеваниях заранее — подберу безопасную нагрузку или порекомендую начать с реабилитационной работы."
  - question: "Как часто нужно заниматься?"
    answer: "Оптимально — 2–3 раза в неделю. Между занятиями — домашнее задание из простых упражнений. Первые результаты заметны через 3–4 недели при регулярности."
  - question: "Можно ли совмещать ЛФК с массажем?"
    answer: "Да, это отличная комбинация. Массаж снимает напряжение и ускоряет восстановление, ЛФК укрепляет и возвращает функцию. Составляю совместный план по запросу."

