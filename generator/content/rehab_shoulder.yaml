faq:
  - question: "С чего начать, если болит плечо?"
    answer: "Запишитесь на пробную сессию. Пришлите документы или выписки заранее — я изучу ситуацию до встречи и приеду подготовленным. На месте: тесты и первый сеанс. Никаких обязательств по курсу заранее."
  - question: "Стоит ли прислать снимки или выписку?"
    answer: "Да, обязательно — если есть. Я изучу материалы до встречи, чтобы уже на первом сеансе работать осознанно, а не тратить время на выяснение деталей."
  - question: "Нужно ли специальное оборудование?"
    answer: "Нет. Я работаю руками — массаж, ПИР, мягкие мануальные техники, ЛФК. Из инвентаря — самое необходимое. Не реабилитационный центр с тренажёрами, зато приезжаю на дом и веду каждого клиента лично — без передачи между специалистами."
  - question: "Как скоро будет результат?"
    answer: "Зависит от ситуации. При остром периоде или после операции — обычно чувствуется улучшение после 3–5 сеансов. Хроническая боль и замороженное плечо требуют больше времени и регулярности. Точные сроки обсудим на консультации."
  - question: "Больно ли работать с плечом?"
    answer: "Техники мягкие. Может быть лёгкий дискомфорт при работе с зажатыми зонами — но не острая боль. Если что-то некомфортно, всегда говорите: подстраиваем интенсивность."
  - question: "Можно ли работать сразу после травмы?"
    answer: "В острый период (первые 3–7 дней) — нет, нужно дать воспалению утихнуть. К работе приступаем когда боль в покое снижается. Точные сроки обсудим на консультации."
  - question: "Вы работаете после операции на плече?"
    answer: "Да, работаю на этапе восстановления — при условии, что прошёл острый послеоперационный период и есть разрешение врача на физическую работу."

