intro:
  text: |
    Черепно-мозговая травма — это не только боль и головокружение в первые дни. Последствия могут длиться месяцами: нарушение координации, двигательный дефицит, спастика, когнитивные изменения.

    Работаю с пациентами после ЧМТ в период восстановления — на дому, по разрешению невролога. Мягкий массаж, пассивная гимнастика и обучение семьи домашней программе.

