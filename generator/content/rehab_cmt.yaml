methodology:
  title: "Как строится работа"
  image: "/assets/image/services/rehab/cmt.jpg"
  steps:
    - number: "01"
      title: "Изучение выписки и согласование"
      description: "До первого сеанса прошу прислать выписку невролога. Уточняю период восстановления, назначения, ограничения. Без разрешения лечащего врача не начинаем."
    - number: "02"
      title: "Ранний период — мягкий старт"
      description: "Только поглаживание, лёгкий лимфодренаж, пассивные движения. Сеанс 20–40 минут, тишина, приглушённый свет. Контроль состояния каждые 10–15 минут."
    - number: "03"
      title: "Поздний период — активная работа"
      description: "Добавляем глубокое разминание, ПИР при низкой спастике, акупрессуру, вертикализацию. Вместе с семьёй разбираем домашнюю программу."
    - number: "04"
      title: "Фиксация динамики и связь с командой"
      description: "Веду журнал сеансов с оценкой состояния. При изменениях — сообщаю семье и рекомендую обратиться к неврологу. Работаю как часть команды, не вместо врача."

