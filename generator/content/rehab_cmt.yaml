faq:
  - question: "Нужно ли разрешение невролога?"
    answer: "Да, обязательно. Прошу прислать выписку до первого сеанса. Работаю в соответствии с тем что указал лечащий врач — не корректирую назначения и не даю прогнозов."
  - question: "Когда можно начинать после травмы?"
    answer: "Острый период (первые 3 недели) — не наш. Начинаем в раннем восстановительном периоде после выписки из стационара и разрешения невролога."
  - question: "Что делать если во время сеанса стало хуже?"
    answer: "Сразу останавливаю работу. При резкой нарастающей головной боли, рвоте, потере сознания или эпилептическом приступе — вызываю скорую. Фиксирую в журнале и сообщаю семье."
  - question: "Можно ли при спастике?"
    answer: "Да — при умеренной спастике работаем расслабляющими техниками: медленные поглаживания, лёгкое разминание. При выраженной спастике — только по согласованию с неврологом."
  - question: "Участвует ли семья в работе?"
    answer: "Да, это важная часть программы. Обучаю родственников правильному положению пациента, пассивным движениям и домашней гимнастике — то что делается между сеансами."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

