faq:
  - question: "Когда можно начинать реабилитацию после операции?"
    answer: "В стационаре реабилитация начинается уже на первый день — дыхательные упражнения и насос голеностопом. Домашняя программа — после выписки и разрешения хирурга, обычно на 2–5 день."
  - question: "Нужно ли разрешение хирурга?"
    answer: "Да, обязательно. Прошу прислать выписку до первого сеанса. Работаю строго в рамках допустимых углов и нагрузки — не корректирую назначения хирурга."
  - question: "Какие движения запрещены после замены тазобедренного сустава?"
    answer: "Три запрещённые комбинации: сгибание бедра более 90°, приведение ноги через среднюю линию и внутренняя ротация. Обучаю этим правилам на первом сеансе — и пациента, и семью."
  - question: "Сколько времени занимает восстановление?"
    answer: "Полный курс — 6–12 месяцев. К 3 месяцам большинство пациентов ходят самостоятельно. К 6 месяцам — возврат к привычной активности. Темп зависит от возраста, состояния и регулярности занятий."
  - question: "Когда нужно срочно вызвать врача?"
    answer: "Немедленно при: щелчке в суставе с резкой болью (вывих протеза), нарастающем отёке одной ноги с покраснением по ходу вены (ТГВ), температуре выше 38°, мокнущем шве."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

