intro:
  text: |
    Эндопротезирование — одна из самых успешных ортопедических операций. Но протез сам по себе не возвращает пациента к жизни: нужна планомерная работа с мышцами, рубцом, равновесием и паттерном ходьбы.

    Приезжаю на дом, работаю строго в рамках разрешений хирурга-ортопеда. Обучаю пациента и семью — безопасным движениям, домашней программе, правилам защиты протеза.

audience:
  title: "Кому подойдёт"
  subtitle: "Работаю с пациентами после замены сустава — только по разрешению хирурга-ортопеда"
  items:
    - icon: "🦴"
      title: "После замены тазобедренного сустава"
      description: "Восстанавливаем силу средней ягодичной, учим безопасному движению — три запретных комбинации которые могут привести к вывиху протеза строго соблюдаются."
    - icon: "🦵"
      title: "После замены коленного сустава"
      description: "Главная задача — восстановить полное разгибание и согнуть до 90° к 6 неделе. Работаем с квадрицепсом, отёком и рубцом."
    - icon: "🏠"
      title: "Восстановление на дому"
      description: "Приезжаю к вам — не нужно добираться до клиники. На первом визите оцениваем бытовую среду: пороги, поручни, высота кровати."
    - icon: "👨‍👩‍👧"
      title: "Семья как часть программы"
      description: "Обучаю родственников как помогать при вставании, ходьбе и выполнении упражнений — без гиперопеки, но с правильной страховкой."
    - icon: "👴"
      title: "Пожилые пациенты 65+"
      description: "Мышцы теряют до 2% объёма в сутки при бездействии — начинаем осторожно, но без промедления. Темп подбирается под возраст и состояние."
    - icon: "🔄"
      title: "После выписки из стационара"
      description: "Стационарный этап завершён — продолжаем амбулаторную программу на дому, не теряя темп восстановления."

methodology:
  title: "Как строится программа"
  image: "/assets/image/services/rehab/endoprotez.jpg"
  steps:
    - number: "01"
      title: "Изучение выписки хирурга"
      description: "До первого сеанса прошу прислать выписку: тип операции, разрешённые углы, антикоагулянты, сопутствующие диагнозы. Без разрешения хирурга не начинаем."
    - number: "02"
      title: "Ранний период (2–6 неделя)"
      description: "Лимфодренаж, работа вокруг рубца, пассивные движения в разрешённом диапазоне. Первая вертикализация — с паузой сидя и страховкой. Учим безопасные движения в быту."
    - number: "03"
      title: "Поздний период (6 нед – 3 мес)"
      description: "Добавляем ПИР, прямую работу с рубцом, укрепление ягодичных и квадрицепса. Прогрессия от изометрии к динамике — по мере готовности тканей."
    - number: "04"
      title: "Возврат к активности (3–12 мес)"
      description: "Восстанавливаем нормальный паттерн ходьбы, работаем с компенсаторными зонами всей кинетической цепи. Цель — полная независимость и возврат к привычной жизни."

