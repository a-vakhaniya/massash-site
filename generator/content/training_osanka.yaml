intro:
  text: |
    Сутулость, округлая спина, голова вперёд — чаще всего это не вопрос воли, а мышечный дисбаланс: одни группы мышц укорочены и напряжены, другие — растянуты и слабы. Без адресной работы с этим дисбалансом осанка не меняется.

    Я персональный тренер и специалист по реабилитационной работе. Приезжаю на дом по Москве, составляю индивидуальную программу и даю домашнее задание на каждый день — чтобы результат не заканчивался после занятия.

