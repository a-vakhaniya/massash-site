faqs:
  - question: "С чего начать, если осанка плохая с детства?"
    answer: "С пробного занятия. Долгая привычка — это не приговор, просто требует больше времени и постепенности. Начинаем с малого: 2–3 базовых упражнения, которые сразу дают ощущение результата. Дальше добавляем."
  - question: "Нужно ли специальное оборудование?"
    answer: "Нет. Базовая программа строится без инвентаря — только пол и ваш вес. Если есть фитбол, резинки или коврик — хорошо, но не обязательно."
  - question: "Как часто нужно заниматься?"
    answer: "Для устойчивого результата — 2 раза в неделю плюс короткий домашний комплекс каждый день (5–10 минут). Первые изменения ощущаются через 2–3 недели."
  - question: "Я работаю за компьютером 8 часов. Поможет ли это?"
    answer: "Да, и именно для вас это особенно важно. Помимо упражнений разбираем организацию рабочего места и привычки — без этого тренировка даст только половину результата."
  - question: "Можно ли при болях в спине?"
    answer: "Зависит от характера боли. На пробном занятии разбираемся — при каких состояниях можно работать сразу, при каких нужна предварительная консультация врача."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

