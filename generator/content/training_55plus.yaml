faqs:
  - question: "Можно ли при артрозе и болях в суставах?"
    answer: "Да — умеренная нагрузка при артрозе полезна, а не вредна. Работаем в безболезненном диапазоне, подбираем упражнения которые не перегружают суставы. Полный покой при артрозе — худшее что можно сделать."
  - question: "Можно ли при гипертонии?"
    answer: "Да, при стабильной гипертонии — можно и нужно. Контролируем интенсивность, избегаем задержки дыхания и резких нагрузок. Если наблюдаетесь у кардиолога — сообщите на первом занятии."
  - question: "Как часто нужно заниматься?"
    answer: "Оптимально 2 раза в неделю плюс короткая активность в остальные дни. В старшем возрасте восстановление важнее частоты — не перегружаем."
  - question: "Нужен ли инвентарь?"
    answer: "Нет, базовая программа строится без инвентаря. Если есть стул, коврик или резинки — хорошо, но не обязательно."
  - question: "С чего начать если давно не занимался?"
    answer: "С пробного занятия. Оцениваем состояние, начинаем с самого лёгкого — и смотрим на реакцию тела. Никакого форсирования: лучше медленно и регулярно, чем интенсивно и с перерывами."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

