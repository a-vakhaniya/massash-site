intro:
  text: |
    После 55 лет мышцы теряют силу, суставы становятся менее подвижными, снижается баланс и координация. Но всё это поддаётся тренировке — просто подход должен быть другим.

    Приезжаю на дом, работаем без тренажёров. Программа строится с учётом вашего состояния, хронических заболеваний и целей. Никакого форсирования — только безопасная прогрессия.

results:
  title: "Что даёт работа с тренером"
  subtitle: "Регулярные тренировки в старшем возрасте — это качество жизни, а не спортивные достижения."
  items:
    - icon: "💪"
      title: "Сохранение мышечной силы"
      description: "После 50 лет мышцы теряют до 1–2% в год без нагрузки. Тренировки замедляют этот процесс и возвращают утраченный тонус."
    - icon: "⚖️"
      title: "Улучшение баланса"
      description: "Риск падений снижается при регулярной работе на координацию и равновесие — ключевой показатель безопасности в старшем возрасте."
    - icon: "🦴"
      title: "Здоровье суставов"
      description: "Умеренная нагрузка улучшает питание хряща и снижает боли при артрозе — главное не перегружать."
    - icon: "❤️"
      title: "Сердце и сосуды"
      description: "Аэробная нагрузка в безопасном диапазоне поддерживает сердечно-сосудистую систему и улучшает самочувствие."
    - icon: "😴"
      title: "Качество сна"
      description: "Физическая активность нормализует сон — один из главных факторов здоровья и восстановления в любом возрасте."
    - icon: "🧠"
      title: "Ясность мышления"
      description: "Движение стимулирует кровоток в мозге и выработку BDNF — нейротрофического фактора, поддерживающего когнитивные функции."

