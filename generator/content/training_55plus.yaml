      description: "Обсуждаем хронические заболевания, что беспокоит, что хотите улучшить. Если есть заключения врача — учитываю при составлении программы."
    - number: "02"
      title: "Мягкая разминка"
      description: "Суставная гимнастика и лёгкие аэробные движения — разогреваем тело без нагрузки на суставы. 10–12 минут обязательно."
    - number: "03"
      title: "Основной блок"
      description: "Упражнения подобранные под вас — силовые, на баланс или растяжку в зависимости от задачи и самочувствия сегодня."
    - number: "04"
      title: "Заминка и рекомендации"
      description: "Лёгкая растяжка и дыхательные упражнения. Обсуждаем как себя чувствуете, даю рекомендации до следующего занятия."

