faqs:
  - q: "Нужно ли раздеваться для тайского массажа?"
    a: "Нет — тайский массаж делается в одежде. Лучше надеть свободные штаны и футболку — чтобы не ограничивали движения при растяжках."
  - q: "Больно ли делать тайский массаж?"
    a: "Интенсивность подбирается индивидуально. Растяжки могут быть ощутимыми, но не болезненными — работаем в комфортном диапазоне."
  - q: "Есть ли противопоказания?"
    a: "Да — острые воспаления, варикоз в тяжёлой форме, беременность, некоторые заболевания суставов. Уточняем на первом сеансе."
  - q: "Чем отличается от классического массажа?"
    a: "Классический работает руками с мышцами лёжа. Тайский — это акупрессура плюс пассивная растяжка всего тела. Другие ощущения, другой результат."
  - q: "Можно ли на кровати?"
    a: "Да, работаю на полу на коврике или на кровати — зависит от условий. Некоторые растяжки удобнее делать на полу, обсуждаем заранее."
  - q: "Выезжаете на дом?"
    a: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."
