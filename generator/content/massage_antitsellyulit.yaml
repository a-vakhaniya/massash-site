faqs:
  - q: "Сколько сеансов нужно для результата?"
    a: "Первые изменения ощущаются после 3–4 сеансов, видимый результат — после 8–10. Для устойчивого эффекта рекомендую курс с частотой 2 раза в неделю."
  - q: "Больно ли делать антицеллюлитный массаж?"
    a: "Ощущения интенсивные, но работаем в комфортном для вас темпе. Говорите если слишком сильно — подстраиваюсь под ваш порог чувствительности."
  - q: "Можно ли во время менструации?"
    a: "В эти дни от массажа живота и поясницы лучше воздержаться. Остальные зоны — по самочувствию."
  - q: "Нужно ли что-то делать после сеанса?"
    a: "Выпить 1–2 стакана воды, избегать горячей ванны в первые часы. Хороший эффект дают контрастный душ и лёгкая активность между сеансами."
  - q: "Помогает ли массаж без диеты и спорта?"
    a: "Массаж улучшает состояние кожи и стимулирует лимфоток, но как самостоятельный инструмент для снижения веса не работает. В сочетании с активностью и питанием — результат заметно лучше."
  - q: "Выезжаете на дом?"
    a: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."
