intro:
  text: |
    Остеохондроз — одна из самых частых причин болей в спине, шее и пояснице. За дискомфортом стоят мышечный спазм, нарушение кровообращения в тканях и ограничение подвижности. Работать нужно с этими причинами, а не только с симптомами.

    Я специалист по реабилитационной работе — приезжаю на дом, разбираю запрос, провожу пробный сеанс и составляю индивидуальную программу. Работа включает массаж, мягкие техники, упражнения и рекомендации по режиму.

