      description: "Работаем с паравертебральными мышцами, триггерными точками, зонами напряжения. Снимаем спазм, улучшаем кровообращение в тканях."
    - number: "03"
      title: "Мягкие техники и ПИР"
      description: "Постизометрическая релаксация — мягкое растяжение укороченных мышц без осевой нагрузки на позвоночник. Улучшает подвижность без риска."
    - number: "04"
      title: "Упражнения и профилактика"
      description: "Даю комплекс для укрепления мышечного корсета и рекомендации по режиму — как двигаться, сидеть и работать чтобы снизить нагрузку на позвоночник."

faq:
  - question: "Можно ли при обострении остеохондроза?"
    answer: "В острую фазу с сильными болями массаж не делаем — сначала нужно снять воспаление. После стихания острых болей начинаем мягкую работу. Если не уверены — уточните у лечащего врача."
  - question: "Сколько сеансов нужно для результата?"
    answer: "Облегчение ощущается после 2–3 сеансов. Для устойчивого результата — курс 8–10 сеансов плюс домашние упражнения. При хроническом остеохондрозе рекомендую поддерживающий режим 1–2 раза в месяц."
  - question: "Поможет ли массаж при грыже?"
    answer: "Массаж работает с мышцами, а не с диском. При грыже он помогает снять мышечный спазм вокруг и улучшить самочувствие, но не устраняет саму грыжу. Решение о работе принимаем после изучения МРТ."
  - question: "Нужно ли приносить МРТ или снимки?"
    answer: "Желательно, особенно если есть МРТ или заключение невролога. Прошу прислать до первого сеанса — это помогает подготовиться и выбрать правильный подход."
  - question: "Можно ли совмещать с другими методами?"
    answer: "Да. Массаж хорошо сочетается с ЛФК, физиотерапией и медикаментозным лечением. Если параллельно наблюдаетесь у врача — сообщите об этом на первом сеансе."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

