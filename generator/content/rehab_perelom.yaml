intro:
  text: |
    Перелом или растяжение — это не только боль в острый период. После снятия гипса начинается не менее важный этап: мышцы атрофированы, сустав скованный, отёчность не уходит неделями. Без правильной работы восстановление затягивается надолго.

    Я специалист по реабилитационной работе — приезжаю на дом, изучаю документы заранее и составляю индивидуальную программу. Массаж, лимфодренаж, мягкие мануальные техники и упражнения — всё в одном курсе.

