intro:
  text: |
    Гипс сняли — но это только начало. Мышцы потеряли тонус, сустав скованный, отёчность не уходит неделями. Без правильной работы восстановление затягивается надолго.

    Работаю по трёхфазной программе: ранняя фаза — лимфодренаж и мягкие техники, основная — массаж и ПИР, функциональная — восстановление паттерна движения. Выезд на дом по Москве.

audience:
  title: "Кому подойдёт"
  subtitle: "Работаю со взрослыми после переломов, растяжений и травм суставов"
  items:
    - icon: "🦴"
      title: "После снятия гипса"
      description: "Конечность отёчная, скованная, мышцы потеряли тонус — начинаем восстановительную работу по фазам, не форсируя."
    - icon: "🦵"
      title: "Растяжения связок"
      description: "Голеностоп, колено, плечо — работаем над восстановлением стабильности и проприоцепции. Связка восстанавливается до 12–24 месяцев — важно не бросать раньше времени."
    - icon: "💧"
      title: "Отёк и скованность"
      description: "Лимфодренаж и мягкие техники возвращают нормальное кровообращение — отёк снижается, подвижность возвращается."
    - icon: "💪"
      title: "Атрофия мышц"
      description: "Мышцы теряют до 30% объёма уже за 48–72 часа иммобилизации. Постепенно восстанавливаем силу — сначала изометрия, затем полноценная нагрузка."
    - icon: "🏃"
      title: "Возврат к активности"
      description: "Спортсмены и активные люди — помогаем безопасно вернуться к нагрузкам, восстанавливаем проприоцепцию и паттерн движения."
    - icon: "👴"
      title: "Пожилые пациенты"
      description: "Переломы шейки бедра, лучезапястного сустава — особый подход с учётом возраста, остеопороза и сопутствующих заболеваний."

methodology:
  title: "Как строится программа"
  image: "/assets/image/services/rehab/perelom.jpg"
  steps:
    - number: "01"
      title: "Изучение документов и оценка"
      description: "Прошу прислать выписку и заключение врача до первого сеанса. На встрече оцениваем отёк, объём движений, состояние тканей — определяем фазу и с чего начинать."
    - number: "02"
      title: "Фаза I — Ранняя (сеансы 1–7)"
      description: "Только мягкие техники: лимфодренаж, поглаживание, работа с отёком вокруг зоны травмы. Никакого давления и разминания — только трофика и снятие отёчности."
    - number: "03"
      title: "Фаза II — Основная (сеансы 8–16)"
      description: "Работа со спайками и рубцом, восстановительный массаж мышц, ПИР — мягкое растяжение укороченных тканей. Добавляем ЛФК: изометрия, затем активные движения."
    - number: "04"
      title: "Фаза III — Функциональная (сеансы 17–24)"
      description: "Нейромышечная активация, восстановление баланса и проприоцепции, переобучение паттерна движения. Домашний комплекс для самостоятельной работы."

