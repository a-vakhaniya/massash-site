faq:
  - question: "Когда можно начинать реабилитацию после перелома?"
    answer: "Сразу после разрешения врача — чем раньше, тем лучше. В ранней фазе работаем только мягкими техниками без нагрузки на зону перелома. Сроки начала активной работы определяет рентген, не ощущения."
  - question: "Нужно ли разрешение врача?"
    answer: "Да, обязательно — особенно при металлофиксации или нестабильном переломе. Прошу прислать выписку до первого сеанса. Работаю в соответствии с тем что указал врач."
  - question: "Сколько сеансов нужно для восстановления?"
    answer: "Программа рассчитана на 20–24 сеанса в три фазы. Простые растяжения восстанавливаются быстрее. Критерий завершения — не календарь, а готовность тканей."
  - question: "Больно ли во время сеансов?"
    answer: "В первой фазе — только мягкие техники без боли. Во второй фазе тянущее ощущение при ПИР — норма, боль — стоп. Всегда работаем в комфортном диапазоне."
  - question: "Когда нужно срочно к врачу?"
    answer: "Если появился нарастающий отёк одной конечности, боль по ходу вены, онемение пальцев или боль непропорциональна травме — прекращаем работу и обращаемся к врачу."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

