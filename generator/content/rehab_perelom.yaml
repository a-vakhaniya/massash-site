methodology:
  title: "Как строится работа"
  image: "/assets/image/services/rehab/perelom.jpg"
  steps:
    - number: "01"
      title: "Изучение документов"
      description: "Прошу прислать выписку, снимки или заключение до первого сеанса. Важно знать характер перелома, период и рекомендации врача."
    - number: "02"
      title: "Оценка состояния"
      description: "На первой встрече смотрим на отёк, объём движений, мышечный тонус. Определяем с чего начинать и какие техники применять."
    - number: "03"
      title: "Массаж и лимфодренаж"
      description: "Снимаем отёчность, улучшаем кровообращение в травмированной зоне, мягко работаем с мышцами вокруг сустава."
    - number: "04"
      title: "Упражнения и домашняя программа"
      description: "Постепенно добавляем упражнения для восстановления подвижности и силы. Даю программу для самостоятельной работы между сеансами."

faq:
  - question: "Когда можно начинать реабилитацию после перелома?"
    answer: "Как только снят гипс или дал добро лечащий врач. Чем раньше начать — тем быстрее восстановление. При некоторых переломах мягкую работу начинают ещё до снятия гипса."
  - question: "Нужно ли разрешение врача?"
    answer: "Желательно. Прошу прислать выписку и рекомендации врача до первого сеанса — это помогает выбрать правильный подход и не навредить."
  - question: "Сколько сеансов нужно для восстановления?"
    answer: "Зависит от сложности перелома и времени иммобилизации. В среднем — курс 10–15 сеансов плюс домашние упражнения. Простые растяжения восстанавливаются быстрее."
  - question: "Больно ли во время сеансов?"
    answer: "Работаем в комфортном диапазоне — без боли. В начале восстановления техники очень мягкие, интенсивность увеличиваем постепенно по мере улучшения состояния."
  - question: "Работаете с переломами шейки бедра?"
    answer: "Да, в том числе с пожилыми пациентами после перелома шейки бедра. Работаем на дому — с учётом возраста, сопутствующих заболеваний и рекомендаций хирурга."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

