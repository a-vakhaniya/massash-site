faq:
  - question: "Когда можно начинать реабилитацию после операции?"
    answer: "Обычно через 2–4 недели после операции — когда сняты швы и утихла острая боль. Точные сроки зависят от типа операции и рекомендаций хирурга. Обсудим на консультации."
  - question: "Обязательно ли присылать выписку заранее?"
    answer: "Да, обязательно. Без выписки я не начинаю работу — это требование безопасности. Выписка даёт понять тип операции, ограничения и текущий период восстановления. Пришлите до первой встречи."
  - question: "Нужно ли специальное оборудование?"
    answer: "Нет. Работаю руками — массаж, ПИР, мягкие мануальные техники, ЛФК. Из инвентаря — самое необходимое. Приезжаю на дом и веду каждого клиента лично, без передачи между специалистами."
  - question: "Можно ли работать если есть металлоконструкция?"
    answer: "Да, работаю с такими пациентами. Металлоконструкция не является противопоказанием — при условии что прошёл острый период и есть разрешение хирурга. Ударные и ротационные техники на оперированном сегменте не применяю."
  - question: "Как скоро будет результат?"
    answer: "Первые изменения — снижение боли и улучшение подвижности — обычно заметны после 3–5 сеансов. Полный курс восстановления занимает 8–20 сеансов в зависимости от операции и периода."
  - question: "Что делать если после сеанса усилилась боль?"
    answer: "Лёгкое усиление в первые сутки — допустимо, это реакция тканей. Если боль выросла значительно или появились новые симптомы — сразу сообщите мне и обратитесь к хирургу. Работаю только в безопасном диапазоне."

