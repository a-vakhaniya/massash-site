intro:
  text: |
    После операции на позвоночнике — удаления грыжи, спондилодеза, декомпрессии — тело восстанавливается поэтапно. Боль, скованность, слабость мышц, страх движения — всё это нормальная часть послеоперационного периода, с которой можно и нужно работать.

    Я специалист по реабилитационной работе — приезжаю на дом, изучаю выписку и протокол операции до встречи, провожу пробную сессию и составляю индивидуальную программу. Работа строится по периодам: ранний, поздний, резидуальный — под каждый свои техники и задачи.

