faqs:
  - question: "Можно ли тренироваться при грыже?"
    answer: "Да, но с ограничениями. Исключаем осевую нагрузку, скручивания и резкие движения. Работаем в безопасных позициях — на спине, боку, стоя с опорой. Если есть МРТ — учитываю при подготовке программы."
  - question: "Не усилит ли тренировка боль?"
    answer: "При правильно подобранной нагрузке — нет. Начинаем очень мягко, слушаем тело. Если что-то вызывает дискомфорт — сразу меняем упражнение. Цель — уменьшить боль, а не добавить."
  - question: "Нужно ли сначала к врачу?"
    answer: "При острой боли или после недавней травмы — сначала к врачу. При хронических болях без острого периода можно начинать сразу. Если есть сомнения — уточните у своего врача."
  - question: "Сколько занятий нужно для результата?"
    answer: "Первое облегчение обычно после 3–5 занятий. Устойчивый результат — курс от 10 занятий плюс домашний комплекс. Всё индивидуально — зависит от диагноза и регулярности."
  - question: "Какой инвентарь нужен?"
    answer: "Ничего обязательного — коврик желателен, но не обязателен. Основная работа с весом тела в безопасных позициях."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

