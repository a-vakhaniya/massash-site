intro:
  text: |
    Боли в спине часто связаны не с самим позвоночником, а со слабыми мышцами вокруг него. Правильно подобранная нагрузка снимает хроническое напряжение, укрепляет стабилизаторы и снижает боль без таблеток.

    Приезжаю на дом, работаем без тренажёров — с весом тела и минимальным инвентарём. Программа строится с учётом вашего диагноза и ограничений. Если есть МРТ или заключение врача — учитываю при подготовке.

