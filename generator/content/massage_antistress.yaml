faqs:
  - q: "Чем антистрессовый массаж отличается от классического?"
    a: "Антистрессовый массаж медленнее и мягче классического. Акцент не на проработку мышц, а на расслабление нервной системы. Движения плавные, ритмичные, давление комфортное. Классический может быть интенсивнее — антистрессовый всегда мягкий."
  - q: "Используете ли вы ароматические масла?"
    a: "По желанию — да. Добавляю несколько капель эфирного масла в массажное масло. Обычно это лаванда для расслабления или эвкалипт для свежести. Если есть аллергия или предпочтения — работаем без ароматики или с вашим маслом."
  - q: "Сколько сеансов нужно для результата?"
    a: "Расслабление и улучшение самочувствия заметны уже после первого сеанса. Для устойчивого результата при хроническом стрессе — курс 4–6 сеансов с интервалом 3–5 дней. Поддерживающий режим — раз в 1–2 недели."
  - q: "Можно ли делать антистрессовый массаж при высоком давлении?"
    a: "Мягкий расслабляющий массаж при стабильном повышенном давлении обычно хорошо переносится и даже помогает его снизить. При гипертоническом кризе или нестабильном давлении — сеанс лучше перенести. При сомнениях — проконсультируйтесь с врачом."
  - q: "Выезжаете ли вы на дом?"
    a: "Да, выезжаю на дом по Москве в пределах МКАД. Приезжаю со всем необходимым — маслом и простынями. Работаю на кровати или диване. Стоимость выезда уточняется индивидуально."
