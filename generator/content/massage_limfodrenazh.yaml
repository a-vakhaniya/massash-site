faqs:
  - q: "Чем лимфодренажный массаж отличается от классического?"
    a: "Лимфодренажный массаж работает с лимфатической системой — мягкими ритмичными движениями выводит лишнюю жидкость и токсины. Классический массаж работает с мышцами и более интенсивен. Лимфодренаж практически безболезненный, давление минимальное — около 30–40 граммов."
  - q: "Сколько сеансов нужно для результата?"
    a: "Первый эффект заметен уже после одного сеанса — уходит тяжесть, уменьшаются отёки. Для устойчивого результата рекомендую курс 5–10 сеансов с интервалом 2–3 дня. При склонности к хроническим отёкам — поддерживающий сеанс раз в 2 недели."
  - q: "Нужна ли специальная подготовка перед сеансом?"
    a: "Нет. Рекомендую выпить стакан воды за 30 минут до сеанса и ещё 1–2 стакана после — это усилит эффект выведения жидкости. Алкоголь и жирная еда в день сеанса нежелательны."
  - q: "Есть ли противопоказания?"
    a: "Основные противопоказания: острые воспалительные процессы, тромбофлебит, онкологические заболевания, сердечная недостаточность, активные инфекции. При хронических заболеваниях проконсультируйтесь с врачом. Сомневаетесь — напишите мне, разберёмся."
  - q: "Выезжаете ли вы на дом?"
    a: "Да, выезжаю на дом по Москве в пределах МКАД. Работаю на кровати или диване клиента — специальный стол не обязателен. Стоимость выезда уточняется индивидуально при записи."
