    - icon: "🏙️"
      title: "Живёте далеко и не можете приезжать на регулярные сеансы"
      description: "Программа в документе — можно работать самостоятельно по чёткому плану."
    - icon: "🔍"
      title: "Хотите получить второе мнение по имеющейся программе"
      description: "Разбираю то, что уже есть, и при необходимости предлагаю корректировки."
    - icon: "🦴"
      title: "Восстанавливаетесь после сложной операции"
      description: "Эндопротезирование, сложные травмы — составляю программу под ваш конкретный этап."
    - icon: "📌"
      title: "Нужен понятный пошаговый план"
      description: "Для себя или родственника — с чёткими инструкциями и дневником наблюдений."

# [NEW] Блок «Как это работает» — 4 шага без фото.
# В rehab_service.html блок methodology всегда рендерит изображение слева.
# Новый шаблон рендерит how_it_works как full-width список шагов.
how_it_works:
  title: "Как это работает"
  steps:
    - number: "01"
      title: "Оставляете заявку"
      description: "Коротко опишите случай через форму — этого достаточно для первого контакта."
    - number: "02"
      title: "Присылаете материалы"
      description: "Выписки, снимки — почтой или в мессенджере. Если каких-то документов нет — не страшно, обсудим."
    - number: "03"
      title: "Изучаю и готовлю программу"
      description: "Разбираю материалы, составляю программу под вашу ситуацию. Обычно 2–4 дня после получения всех материалов."
    - number: "04"
      title: "Получаете документ"
      description: "Этапы, правила безопасности, упражнения с дозировкой, дневник наблюдений. По желанию — личный разбор упражнений очно или по видеосвязи."

# [NEW] Блок «Что входит в программу» — список пунктов.
# Новый тип блока: простой список с bullet-items.
whats_included:
  title: "Что входит в программу"
  items:
    - "Персональная программа документом — с учётом этапа и особенностей случая"
    - "Правила безопасности — что можно и нельзя на данном этапе восстановления"
    - "Комплекс упражнений — с чёткой дозировкой и техникой выполнения"
    - "Режим нагрузок — как безопасно увеличивать активность"
    - "Дневник наблюдений — для отслеживания прогресса"
    - "По желанию — личный разбор упражнений, очно или по видеосвязи, чтобы вы точно всё делали правильно"

# [NEW] Блок «Чем это отличается» — карточки с заголовком и описанием.
# Новый тип блока: title + items[{title, description}].
differentiators:
  heading: "Не курс для всех, а программа под вас"
  items:
    - title: "Индивидуально, а не по шаблону"
      description: "Программа составляется под ваш случай и вашу ситуацию, а не собирается из готового набора уроков для всех."
    - title: "Без лишнего"
      description: "Только то, что нужно на вашем этапе восстановления, без часов общих лекций."
    - title: "С контролем техники"
      description: "Если выбираете личный разбор, вы точно знаете, что делаете упражнения правильно, а не повторяете за видео из интернета."

# [NEW] Блок стоимости без таблицы — только заголовок и текст.
# В rehab_service.html блок price всегда рендерит price_rows.
# Новый шаблон рендерит price_custom как текстовый блок с CTA.
price_custom:
  title: "Стоимость — по запросу"
  text: "Каждый случай индивидуален по объёму и сложности материалов, поэтому точную стоимость называю после изучения вашей ситуации. Оставьте заявку — обсудим детали и формат работы."
  cta: "Оставить заявку"

faq:
  - question: "Какие документы нужно прислать?"
    answer: "Выписки из больницы, снимки, описание диагноза или ситуации — всё, что у вас есть. Если каких-то документов нет — не страшно, обсудим."
  - question: "Сколько времени занимает подготовка программы?"
    answer: "Обычно 2–4 дня после получения всех материалов, в зависимости от сложности случая."
  - question: "Это замена работе с врачом?"
    answer: "Нет, программа не заменяет консультацию и наблюдение врача. Это оздоровительная программа восстановления, которая дополняет назначенное лечение."
  - question: "Можно ли получить только документ без личного объяснения?"
    answer: "Да, это отдельная опция — выбираете формат при заявке."
  - question: "Как проходит личное объяснение упражнений?"
    answer: "Очно на встрече или по видеосвязи — показываю и объясняю технику выполнения каждого упражнения."
  - question: "Подходит ли программа для пожилых родственников?"
    answer: "Да, часто такие программы заказывают для родителей — с понятными инструкциями и дневником для контроля."

