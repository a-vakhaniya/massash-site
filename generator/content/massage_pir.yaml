faqs:
  - q: "Больно ли делать ПИР?"
    a: "Нет — это одна из главных особенностей техники. Работаем через лёгкое усилие без боли. Если что-то некомфортно — сразу корректируем."
  - q: "Чем ПИР отличается от мануальной терапии?"
    a: "Мануальная терапия работает с суставами и может включать резкие движения. ПИР работает только с мышцами — через плавное растяжение без рывков и хруста."
  - q: "Сколько сеансов нужно?"
    a: "Первый результат ощущается уже после одного сеанса. Для устойчивого эффекта — 3–5 сеансов плюс домашние упражнения. При хронических состояниях — курс 8–10 сеансов."
  - q: "Можно ли при грыже позвоночника?"
    a: "Да, ПИР — одна из немногих техник которая безопасна при грыжах. Нет осевой нагрузки и резких движений. Уточните на первом сеансе с учётом вашего МРТ."
  - q: "Можно ли сочетать с обычным массажем?"
    a: "Да, и это очень эффективная комбинация. Массаж разогревает и расслабляет поверхностные мышцы, ПИР работает глубже — с укороченными и спазмированными слоями."
  - q: "Выезжаете на дом?"
    a: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."
