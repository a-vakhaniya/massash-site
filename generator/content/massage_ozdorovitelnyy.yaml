faqs:
  - q: "Чем оздоровительный массаж отличается от классического?"
    a: "По технике они похожи. Разница в акценте: классический чаще назначают при конкретных жалобах, оздоровительный — для общего тонуса и профилактики. На практике подбираю технику под запрос конкретного человека."
  - q: "Как часто делать оздоровительный массаж?"
    a: "Для поддержания тонуса — 1–2 раза в месяц. При накопленном напряжении — курс 5–10 сеансов с частотой 2 раза в неделю, затем поддерживающий режим."
  - q: "Можно ли без конкретных жалоб?"
    a: "Да, это как раз основное показание для оздоровительного массажа. Не обязательно ждать пока что-то заболит — профилактика работает лучше."
  - q: "Подходит ли пожилым людям?"
    a: "Да, подбираем интенсивность под возраст и состояние. Мягкая работа без интенсивного давления — только комфортные ощущения."
  - q: "Можно ли делать при хронических заболеваниях?"
    a: "Зависит от заболевания. Уточните на первом сеансе — разберём что можно, что нужно учесть. При острых состояниях массаж не делаем."
  - q: "Выезжаете на дом?"
    a: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."
