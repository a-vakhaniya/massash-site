intro:
  text: |
    Сутулость, сколиоз, асимметрия плеч — эти нарушения формируются годами и не исчезают сами по себе. За ними стоят мышечный дисбаланс, укороченные группы мышц и закрепившиеся двигательные привычки. Работать нужно комплексно.

    Я специалист по реабилитационной работе — приезжаю на дом, оцениваю состояние осанки, провожу пробный сеанс и составляю индивидуальную программу. Работа включает массаж, мягкие техники, упражнения и рекомендации по повседневному образу жизни.

