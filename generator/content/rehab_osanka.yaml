methodology:
  title: "Как строится работа"
  image: "/assets/image/services/rehab/osanka.jpg"
  steps:
    - number: "01"
      title: "Оценка состояния"
      description: "На первой встрече разбираем запрос, смотрим на осанку, обсуждаем образ жизни и привычки. Если есть снимки или заключения — прошу прислать заранее для подготовки."
    - number: "02"
      title: "Массаж и мягкие техники"
      description: "Работа с перегруженными и укороченными мышцами — снимаем спазм, улучшаем подвижность грудного отдела и шеи, выравниваем напряжение по сторонам."
    - number: "03"
      title: "Упражнения и активация"
      description: "Укрепляем слабые мышцы-стабилизаторы, активируем ягодицы и кор, учим тело держать правильное положение без усилий."
    - number: "04"
      title: "Домашняя программа"
      description: "Даю короткий комплекс на каждый день и рекомендации по рабочему месту — без этого результат от сессий закрепляется хуже."

faq:
  - question: "Можно ли исправить осанку у взрослого?"
    answer: "Да, хотя взрослым требуется больше времени, чем подросткам. Мышцы и привычки поддаются коррекции в любом возрасте — важна регулярность и работа не только на сессиях, но и в повседневной жизни."
  - question: "Сколько сеансов нужно?"
    answer: "Первые изменения ощущаются через 3–5 сеансов. Устойчивый результат — курс от 10 сеансов плюс домашняя программа. Всё индивидуально — разбираем на пробном сеансе."
  - question: "Чем отличается от обычного массажа?"
    answer: "Обычный массаж снимает напряжение, но не меняет паттерн движения. Здесь работаем комплексно: массаж + упражнения + коррекция привычек. Только так результат остаётся надолго."
  - question: "Нужны ли снимки или заключения?"
    answer: "Не обязательно, но желательно — особенно если есть снимки позвоночника или заключение врача. Прошу прислать до первого сеанса для подготовки к работе."
  - question: "Можно ли при болях в спине?"
    answer: "Зависит от характера боли. При хронических болях, связанных с осанкой — да, это как раз наш случай. При острых состояниях сначала нужна консультация врача."
  - question: "Выезжаете на дом?"
    answer: "Да, работаю с выездом на дом по Москве в пределах МКАД. Стоимость выезда обсуждается отдельно при записи."

