faqs:
  - question: "Что нужно для онлайн-тренировки?"
    answer: "Телефон, планшет или ноутбук с камерой, интернет и немного свободного места — примерно 2×2 метра. Устанавливаете телефон так чтобы я видел вас в полный рост — и всё готово."
  - question: "Через какое приложение проходят тренировки?"
    answer: "Через любое удобное — Zoom, WhatsApp, Telegram. Договариваемся заранее что удобнее вам."
  - question: "Можно ли без инвентаря?"
    answer: "Да, базовая программа строится только с весом тела. Если есть резинки, гантели или коврик — хорошо, но не обязательно."
  - question: "Так же эффективно как очные тренировки?"
    answer: "Для большинства задач — да. Особенно если уже знаете базовые упражнения. Для новичков первые 2–3 занятия лучше провести очно чтобы поставить технику."
  - question: "Можно ли совмещать онлайн и очные тренировки?"
    answer: "Да, это хороший вариант — очные занятия раз в 2 недели для коррекции техники, онлайн в остальные дни."
  - question: "Как оплатить?"
    answer: "Переводом на карту или наличными при очной встрече. Работаю как ИП — могу выдать чек."

