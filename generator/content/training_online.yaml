intro:
  text: |
    Онлайн-тренировка — это не видео из YouTube. Это живой сеанс с тренером: вижу вас, корректирую технику, подстраиваю нагрузку по ходу занятия.

    Работаем через видеозвонок — Zoom, WhatsApp или любой удобный сервис. Нужен только телефон или ноутбук, немного места и желание двигаться.

